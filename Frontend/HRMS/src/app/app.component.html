<div *ngFor="let st of students">
  <span style="margin-right: 5px;">{{st.name}}</span>
  <span style="margin-right: 5px;">{{st.mark}}%</span>
  <span *ngIf="st.mark > 50">Passed</span>
  <span *ngIf="st.mark <= 50">Failed</span>
</div>
